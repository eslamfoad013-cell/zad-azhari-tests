<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار النحو الواضح - الجزء الأول</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --bg-color: #f5f6fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dcdde1;
            --hover-color: #ecf0f1;
            --font-size-base: 18px;
        }

        body.dark-mode {
            --primary-color: #ecf0f1;
            --secondary-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f5f6fa;
            --border-color: #333333;
            --hover-color: #2c3e50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: var(--font-size-base);
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-primary { background-color: var(--secondary-color); color: white; }
        .btn-primary:hover { background-color: #2980b9; }
        
        .btn-outline { background-color: transparent; border: 2px solid var(--secondary-color); color: var(--text-color); }
        .btn-outline:hover { background-color: var(--secondary-color); color: white; }

        .btn-icon { background: none; font-size: 1.5rem; color: var(--text-color); padding: 5px; }

        .card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .hidden { display: none !important; }

        /* Setup Screen */
        .setup-screen input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
        }

        .setup-screen label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        /* Quiz Screen */
        .progress-container {
            width: 100%;
            background-color: var(--border-color);
            border-radius: 10px;
            height: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--secondary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--secondary-color);
            font-weight: bold;
        }

        .meta-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 15px;
        }

        .tag {
            background-color: var(--hover-color);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--primary-color);
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .option:hover:not(.disabled) {
            background-color: var(--hover-color);
            border-color: var(--secondary-color);
        }

        .option.correct {
            background-color: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }

        .option.incorrect {
            background-color: var(--danger-color);
            color: white;
            border-color: var(--danger-color);
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            animation: fadeIn 0.5s;
        }

        .feedback-correct { background-color: rgba(39, 174, 96, 0.1); border-right: 5px solid var(--success-color); color: var(--success-color); }
        .feedback-incorrect { background-color: rgba(231, 76, 60, 0.1); border-right: 5px solid var(--danger-color); color: var(--danger-color); }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        /* Results Screen */
        .results-screen { text-align: center; }
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--bg-color);
            border: 10px solid var(--secondary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            margin: 0 auto 20px;
            color: var(--primary-color);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: var(--bg-color);
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        /* Review Screen */
        .review-item {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .review-item h4 { color: var(--primary-color); margin-bottom: 10px; }
        .review-ans { padding: 8px; border-radius: 4px; margin-bottom: 5px; }
        .ans-correct { background-color: rgba(39, 174, 96, 0.2); }
        .ans-wrong { background-color: rgba(231, 76, 60, 0.2); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr; }
            .navigation { flex-direction: column; gap: 10px; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <div>
            <button class="btn-icon" onclick="toggleTheme()" title="تغيير المظهر">🌙</button>
        </div>
        <div>
            <button class="btn-icon" onclick="changeFontSize(1)" title="تكبير الخط">A+</button>
            <button class="btn-icon" onclick="changeFontSize(-1)" title="تصغير الخط">A-</button>
        </div>
    </div>

    <!-- Intro Screen -->
    <div id="setup-screen" class="card setup-screen">
        <h1 style="color: var(--primary-color); text-align: center; margin-bottom: 10px;">اختبار النحو الواضح</h1>
        <p style="text-align: center; margin-bottom: 30px;">(الجملة المفيدة إلى الجملة الاسمية) - أسئلة مستخرجة حصراً من تمرينات الكتاب</p>
        
        <input type="text" id="student-name" placeholder="اسم الطالب (اختياري)">
        
        <label>
            <input type="checkbox" id="enable-timer">
            تفعيل المؤقت الزمني (30 ثانية لكل سؤال)
        </label>

        <button class="btn-primary" style="width: 100%; padding: 15px; font-size: 1.2rem;" onclick="startQuiz()">ابدأ الاختبار</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="card hidden">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        
        <div class="quiz-header">
            <span id="question-counter">السؤال 1 من 50</span>
            <span id="timer-display" class="hidden">⏱ 30</span>
            <span id="score-counter">الدرجة: 0</span>
        </div>

        <div id="meta-container" class="meta-tags"></div>

        <div id="question-text" class="question-text"></div>
        
        <div id="options-container" class="options"></div>

        <div id="feedback-container" class="hidden"></div>

        <div class="navigation">
            <button id="btn-prev" class="btn-outline" onclick="prevQuestion()" disabled>السابق</button>
            <button id="btn-end" class="btn-outline" style="color: var(--danger-color); border-color: var(--danger-color);" onclick="finishQuizEarly()">إنهاء الاختبار</button>
            <button id="btn-next" class="btn-primary" onclick="nextQuestion()" disabled>التالي</button>
        </div>
    </div>

    <!-- Results Screen -->
    <div id="results-screen" class="card results-screen hidden">
        <h2 style="color: var(--primary-color); margin-bottom: 20px;">نتيجة الاختبار</h2>
        <h3 id="result-name" style="margin-bottom: 20px;"></h3>
        
        <div class="score-circle" id="final-percentage">0%</div>
        <h2 id="final-grade" style="margin-bottom: 30px; color: var(--secondary-color);"></h2>

        <div class="stats-grid">
            <div class="stat-box" style="color: var(--success-color);">الإجابات الصحيحة: <span id="stat-correct">0</span></div>
            <div class="stat-box" style="color: var(--danger-color);">الإجابات الخاطئة: <span id="stat-wrong">0</span></div>
            <div class="stat-box">الدرجة الإجمالية: <span id="stat-score">0</span> / 50</div>
            <div class="stat-box">الأسئلة المتروكة: <span id="stat-skipped">0</span></div>
        </div>

        <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
            <button class="btn-primary" onclick="showReview()">مراجعة الاختبار</button>
            <button class="btn-outline" onclick="location.reload()">إعادة الاختبار</button>
        </div>
    </div>

    <!-- Review Screen -->
    <div id="review-screen" class="card hidden">
        <h2 style="color: var(--primary-color); margin-bottom: 20px; text-align: center;">مراجعة الإجابات</h2>
        <div id="review-container"></div>
        <button class="btn-primary" style="width: 100%; margin-top: 20px;" onclick="location.reload()">الصفحة الرئيسية</button>
    </div>

</div>

    // State Variables
    let currentQuestionIndex = 0;
    let score = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let timerInterval;
    let timerEnabled = false;
    let timeRemaining = 30;

    // DOM Elements
    const setupScreen = document.getElementById('setup-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultsScreen = document.getElementById('results-screen');
    const reviewScreen = document.getElementById('review-screen');
    
    // UI Helpers
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
    }

    let fontSize = 18;
    function changeFontSize(step) {
        fontSize += step * 2;
        if(fontSize < 14) fontSize = 14;
        if(fontSize > 28) fontSize = 28;
        document.documentElement.style.setProperty('--font-size-base', `${fontSize}px`);
    }

    function startQuiz() {
        const nameInput = document.getElementById('student-name').value;
        if (nameInput) document.getElementById('result-name').innerText = `الطالب: ${nameInput}`;
        
        timerEnabled = document.getElementById('enable-timer').checked;
        
        setupScreen.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        
        renderQuestion();
    }

    function renderQuestion() {
        const qData = quizData[currentQuestionIndex];
        
        // Update Progress
        document.getElementById('question-counter').innerText = `السؤال ${currentQuestionIndex + 1} من ${quizData.length}`;
        document.getElementById('progress-bar').style.width = `${((currentQuestionIndex + 1) / quizData.length) * 100}%`;
        
        // Update Meta Tags
        const metaContainer = document.getElementById('meta-container');
        metaContainer.innerHTML = `
            <span class="tag">الدرس: ${qData.lesson} (${qData.lessonNum})</span>
            <span class="tag">ص ${qData.page} | ت ${qData.exNum} | س ${qData.qNumInside}</span>
            <span class="tag">الصعوبة: ${qData.diff}</span>
        `;

        // Render Question
        document.getElementById('question-text').innerText = qData.question;
        
        // Render Options
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        qData.options.forEach((opt, idx) => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => selectAnswer(idx);
            optionsContainer.appendChild(btn);
        });

        // Hide feedback
        document.getElementById('feedback-container').classList.add('hidden');
        
        // Buttons state
        document.getElementById('btn-prev').disabled = (currentQuestionIndex === 0);
        document.getElementById('btn-next').disabled = true;

        // Restore answer if exists
        if (userAnswers[currentQuestionIndex] !== null) {
            selectAnswer(userAnswers[currentQuestionIndex], true);
        } else {
            resetTimer();
        }
    }

    function selectAnswer(index, isRestoring = false) {
        if (userAnswers[currentQuestionIndex] !== null && !isRestoring) return; // Prevent re-answering
        
        if (!isRestoring) {
            userAnswers[currentQuestionIndex] = index;
            clearInterval(timerInterval);
        }

        const qData = quizData[currentQuestionIndex];
        const options = document.querySelectorAll('.option');
        const feedbackContainer = document.getElementById('feedback-container');
        
        // Disable all options
        options.forEach(opt => opt.classList.add('disabled'));

        // Check Answer
        if (index === qData.correct) {
            options[index].classList.add('correct');
            feedbackContainer.innerHTML = `<div>✔ إجابة صحيحة</div><div style="font-size: 0.9em; margin-top:5px; font-weight:normal;">${qData.explain}</div>`;
            feedbackContainer.className = 'feedback-box feedback-correct';
        } else {
            options[index].classList.add('incorrect');
            options[qData.correct].classList.add('correct');
            feedbackContainer.innerHTML = `<div>✘ إجابة غير صحيحة</div><div style="font-size: 0.9em; margin-top:5px; font-weight:normal;">السبب: ${qData.explain}</div>`;
            feedbackContainer.className = 'feedback-box feedback-incorrect';
        }

        feedbackContainer.classList.remove('hidden');
        
        // Enable Next
        document.getElementById('btn-next').disabled = false;
        if (currentQuestionIndex === quizData.length - 1) {
            document.getElementById('btn-next').innerText = "إنهاء وعرض النتيجة";
        } else {
            document.getElementById('btn-next').innerText = "التالي";
        }

        updateScoreCounter();
    }

    function updateScoreCounter() {
        score = userAnswers.filter((ans, idx) => ans === quizData[idx].correct).length;
        document.getElementById('score-counter').innerText = `الدرجة: ${score}`;
    }

    function nextQuestion() {
        if (currentQuestionIndex < quizData.length - 1) {
            currentQuestionIndex++;
            renderQuestion();
        } else {
            finishQuiz();
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            renderQuestion();
        }
    }

    function finishQuizEarly() {
        if(confirm('هل أنت متأكد من إنهاء الاختبار الآن؟')) {
            finishQuiz();
        }
    }

    function finishQuiz() {
        clearInterval(timerInterval);
        quizScreen.classList.add('hidden');
        resultsScreen.classList.remove('hidden');

        updateScoreCounter();
        const correctCount = score;
        const wrongCount = userAnswers.filter((ans, idx) => ans !== null && ans !== quizData[idx].correct).length;
        const skippedCount = userAnswers.filter(ans => ans === null).length;
        const percentage = Math.round((correctCount / quizData.length) * 100);

        document.getElementById('final-percentage').innerText = `${percentage}%`;
        document.getElementById('stat-correct').innerText = correctCount;
        document.getElementById('stat-wrong').innerText = wrongCount;
        document.getElementById('stat-score').innerText = correctCount;
        document.getElementById('stat-skipped').innerText = skippedCount;

        let grade = "";
        if (percentage >= 90) grade = "ممتاز";
        else if (percentage >= 80) grade = "جيد جداً";
        else if (percentage >= 70) grade = "جيد";
        else if (percentage >= 50) grade = "مقبول";
        else grade = "يحتاج إلى مراجعة";

        document.getElementById('final-grade').innerText = grade;
    }

    function showReview() {
        resultsScreen.classList.add('hidden');
        reviewScreen.classList.remove('hidden');

        const container = document.getElementById('review-container');
        container.innerHTML = '';

        quizData.forEach((q, idx) => {
            const uAns = userAnswers[idx];
            const isCorrect = uAns === q.correct;
            
            let html = `
                <div class="review-item">
                    <h4>السؤال ${idx + 1}: ${q.question}</h4>
                    <div class="review-ans ${isCorrect ? 'ans-correct' : 'ans-wrong'}">
                        <strong>إجابتك:</strong> ${uAns !== null ? q.options[uAns] : 'لم تتم الإجابة'}
                    </div>
                    ${!isCorrect ? `<div class="review-ans ans-correct"><strong>الإجابة الصحيحة:</strong> ${q.options[q.correct]}</div>` : ''}
                    <div style="margin-top: 10px; font-size: 0.9em; color: var(--secondary-color);">
                        <strong>التعليل:</strong> ${q.explain}
                    </div>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    function resetTimer() {
        if (!timerEnabled) return;
        clearInterval(timerInterval);
        timeRemaining = 30;
        const timerDisplay = document.getElementById('timer-display');
        timerDisplay.classList.remove('hidden');
        timerDisplay.innerText = `⏱ ${timeRemaining}`;
        timerDisplay.style.color = "inherit";
        
        timerInterval = setInterval(() => {
            timeRemaining--;
            timerDisplay.innerText = `⏱ ${timeRemaining}`;
            if (timeRemaining <= 10) timerDisplay.style.color = "var(--danger-color)";
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                selectAnswer(-1); // Register as wrong/timeout
                document.getElementById('feedback-container').innerHTML = `<div style="color:var(--danger-color); font-weight:bold;">انتهى الوقت!</div>`;
            }
        }, 1000);
    }
</script>

</body>
</html>
